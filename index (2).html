<style>
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;
    --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.06);
    --text:#1a1917;--text2:#6b6a65;--text3:#9e9d98;
    --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:.9rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
  .logo{width:32px;height:32px;background:#1a1917;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  header h1{font-size:15px;font-weight:600;letter-spacing:-.02em}
  header p{font-size:11px;color:var(--text2);margin-top:1px}
  .badge{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;flex-shrink:0}
  .main{padding:1.1rem 1.5rem 3rem;max-width:1600px;margin:0 auto}
  .ctrl-row{display:flex;flex-wrap:wrap;gap:1.1rem;margin-bottom:.9rem;align-items:flex-start}
  .ctrl-grp{display:flex;flex-direction:column;gap:4px}
  .ctrl-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
  .btn-row{display:flex;flex-wrap:wrap;gap:4px}
  .fbtn{font-family:'DM Sans',sans-serif;font-size:12px;padding:3px 10px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;transition:all .12s;font-weight:500}
  .fbtn:hover{border-color:rgba(0,0,0,.22);color:var(--text)}
  .fbtn.on{background:var(--text);color:#fff;border-color:var(--text)}
  .leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:.9rem;padding:.55rem .85rem;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);align-items:center}
  .leg-sec{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .leg-div{width:1px;height:16px;background:var(--border);margin:0 4px;flex-shrink:0}
  .leg-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
  .li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
  .ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .gantt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;box-shadow:var(--shadow)}
  table.g{border-collapse:collapse;font-size:11px;white-space:nowrap}
  .g th{font-family:'DM Mono',monospace;font-weight:500;font-size:10px;color:var(--text3);text-align:center;padding:4px 1px;border-bottom:1px solid var(--border2);position:sticky;top:0;background:var(--surface);z-index:20}
  .g th.lh{text-align:left;padding:4px 10px 4px 8px;min-width:170px;position:sticky;left:0;z-index:30;border-right:1px solid var(--border2)}
  .g td{padding:1px;height:26px;border-bottom:1px solid var(--border2)}
  .g td.lt{position:sticky;left:0;background:var(--surface);z-index:10;padding:2px 8px;border-right:1px solid var(--border2);min-width:170px}
  .pn{font-size:11px;font-weight:600;color:var(--text)}
  .tt{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-left:4px}
  .ps{font-size:10px;color:var(--text3);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:162px}
  .dc{width:16px;min-width:16px;max-width:16px;padding:3px 1px;vertical-align:middle}
  .we{background:var(--surface2)}.tc{background:rgba(55,138,221,.12)}.ws{border-left:1px solid var(--border2)!important}.ht{color:#378ADD!important;font-weight:600!important}
  .bs{background:var(--surface2);padding:4px 8px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);position:sticky;left:0}
  #tt{position:fixed;background:#1a1917;color:#fff;border-radius:7px;padding:7px 12px;font-size:12px;pointer-events:none;z-index:9999;display:none;line-height:1.9;max-width:230px;box-shadow:0 4px 14px rgba(0,0,0,.25)}
  #tt b{font-weight:600;font-size:13px}
  .tbadge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-top:2px}
  .stats{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:.9rem}
  .sc{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 12px;min-width:95px}
  .sn{font-size:20px;font-weight:600;letter-spacing:-.02em}
  .sl{font-size:10px;color:var(--text3);margin-top:1px}
  .empty{padding:2.5rem;text-align:center;color:var(--text3);font-size:13px}
  /* bar */
  .bw{width:14px;height:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer}
  .bm{width:14px;height:15px;border-radius:3px;transition:opacity .1s,transform .1s;display:flex;align-items:center;justify-content:center}
  .bw:hover .bm{opacity:.8;transform:scaleY(1.1)}
  .pb{width:14px;height:18px;border-radius:3px;background:repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);border:1px dashed rgba(0,0,0,.12)}
  /* indicators inside bar */
  .i-prod{width:7px;height:3px;border-radius:1px;background:#fff;opacity:.9}
  .i-camp{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:7px solid #fff;opacity:.95}
  .i-spec{width:6px;height:6px;border-radius:50%;background:#fff;opacity:.95}
  .i-apres{width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:7px solid #fff;opacity:.95}
</style>
</head>

  {b:'Bloco 3',t:'801',d:'Arte',      ds:['26/03','02/04','09/04','16/04','30/04','07/05']},
  {b:'Bloco 3',t:'900',d:'Arte',      ds:['24/03','31/03','07/04','14/04','28/04','05/05','12/05']},
  {b:'Bloco 3',t:'900',d:'Ciências',  ds:['01/04','06/04','08/04','13/04','15/04','27/04','29/04','04/05']},
  {b:'Bloco 3',t:'901',d:'Arte',      ds:['26/03','02/04','09/04','16/04','30/04','07/05','14/05']},
  {b:'Bloco 3',t:'901',d:'Ciências',  ds:['01/04','06/04','08/04','13/04','15/04','27/04','29/04','04/05']},
];

function ta(t){const n=parseInt(t);return n<700?'6':n<800?'7':n<900?'8':'9'}
function pkey(p){const bn=parseInt(p.b.split(' ')[1]);const d=p.d==='Geometria'?'Matemática':p.d;return `${ta(p.t)}_${d}_${bn}`}
function lt(p,ds){if(p.p)return null;const m=DATE_TYPES[pkey(p)];return m?m[ds]||'Aula de Projeto':'Aula de Projeto'}
function pn(p){return PNAMES[pkey(p)]||''}
function pd(s){const[d,m]=s.split('/').map(Number);return new Date(2026,m-1,d)}
function fd(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')}
function ad(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}

const today=new Date(2026,2,30);
document.getElementById('tbadge').textContent='Hoje: '+fd(today)+'/2026';
const S=new Date(2026,1,24),E=new Date(2026,4,18),days=[];
for(let d=new Date(S);d<=E;d=ad(d,1))days.push(new Date(d));

const allT=[...new Set(PROJ.map(p=>p.t))].sort();
const allB=['Bloco 1','Bloco 2','Bloco 3'];
const allD=Object.keys(DC);
let aT=new Set(allT),aB=new Set(allB),aD=new Set(allD);

document.getElementById('dleg').innerHTML=Object.entries(DC).map(([n,c])=>`<div class="li"><span class="ld" style="background:${c}"></span>${n}</div>`).join('');

function mkBtn(id,items,active,onChange){
  const el=document.getElementById(id);
  items.forEach(v=>{
    const b=document.createElement('button');
    b.className='fbtn on';b.textContent=v;
    b.onclick=()=>{b.classList.toggle('on');active[b.classList.contains('on')?'add':'delete'](v);render()};
    el.appendChild(b);
  });
}
mkBtn('tf',allT,aT);mkBtn('bf',allB,aB);
allD.forEach(d=>{
  const b=document.createElement('button');
  b.className='fbtn on';b.textContent=d;b.style.borderLeft=`3px solid ${DC[d]}`;
  b.onclick=()=>{b.classList.toggle('on');aD[b.classList.contains('on')?'add':'delete'](d);render()};
  document.getElementById('df').appendChild(b);
});

const tip=document.getElementById('tt');
document.addEventListener('mousemove',e=>{if(tip.style.display==='block'){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-12)+'px'}});

function ind(type){
  if(!type||type==='Aula de Projeto')return '';
  if(type==='Produção')return '<span class="i-prod"></span>';
  if(type==='Pesquisa de campo')return '<span class="i-camp"></span>';
  if(type==='Visita do especialista')return '<span class="i-spec"></span>';
  if(type==='Apresentação do Produto')return '<span class="i-apres"></span>';
  return '';
}

function render(){
  const filt=PROJ.filter(p=>aT.has(p.t)&&aB.has(p.b)&&(p.p||aD.has(p.d)||(p.d==='Geometria'&&aD.has('Matemática'))));
  const total=filt.filter(p=>!p.p).length,pend=filt.filter(p=>p.p).length;
  const trms=new Set(filt.map(p=>p.t)).size;
  const taulas=filt.filter(p=>!p.p).reduce((a,p)=>a+p.ds.length,0);
  const tc={};filt.filter(p=>!p.p).forEach(p=>p.ds.forEach(d=>{const t=lt(p,d)||'Aula de Projeto';tc[t]=(tc[t]||0)+1}));

  document.getElementById('stats').innerHTML=`
    <div class="sc"><div class="sn">${total}</div><div class="sl">Projetos ativos</div></div>
    <div class="sc"><div class="sn">${trms}</div><div class="sl">Turmas</div></div>
    <div class="sc"><div class="sn">${taulas}</div><div class="sl">Aulas agendadas</div></div>
    ${tc['Produção']?`<div class="sc"><div class="sn" style="color:#7C3AED">${tc['Produção']}</div><div class="sl">Produção</div></div>`:''}
    ${tc['Apresentação do Produto']?`<div class="sc"><div class="sn" style="color:#DB2777">${tc['Apresentação do Produto']}</div><div class="sl">Apresentações</div></div>`:''}
    ${tc['Pesquisa de campo']?`<div class="sc"><div class="sn" style="color:#059669">${tc['Pesquisa de campo']}</div><div class="sl">Pesq. de campo</div></div>`:''}
    ${tc['Visita do especialista']?`<div class="sc"><div class="sn" style="color:#D97706">${tc['Visita do especialista']}</div><div class="sl">Visita especialista</div></div>`:''}
    ${pend?`<div class="sc"><div class="sn" style="color:#9e9d98">${pend}</div><div class="sl">Pendentes</div></div>`:''}`;

  const tbl=document.getElementById('gantt');
  if(!filt.length){tbl.innerHTML='<tr><td class="empty" colspan="200">Nenhum projeto selecionado.</td></tr>';return}

  let h='<thead><tr><th class="lh">Projeto</th>';
  let wi=0;
  while(wi<days.length){
    let sp=1;while(wi+sp<days.length&&days[wi+sp].getDay()!==1)sp++;
    const cl=days[wi].getTime()===today.getTime()?' ht':'';
    h+=`<th colspan="${sp}" class="ws${cl}">${fd(days[wi])}</th>`;wi+=sp;
  }
  h+='</tr></thead><tbody>';

  ['Bloco 1','Bloco 2','Bloco 3'].forEach(bloco=>{
    if(!aB.has(bloco))return;
    const rows=filt.filter(p=>p.b===bloco);
    if(!rows.length)return;
    h+=`<tr><td class="bs" colspan="${days.length+1}">${bloco}</td></tr>`;
    rows.forEach(proj=>{
      const pd2=new Set(proj.ds);const col=DC[proj.d]||'#aaa';const pname=pn(proj);
      h+=`<tr><td class="lt"><span class="pn">${proj.d}<span class="tt">${proj.t}</span></span>${pname?`<span class="ps" title="${pname}">${pname}</span>`:''}</td>`;
      days.forEach(d=>{
        const dow=d.getDay(),isT=d.getTime()===today.getTime(),isMon=dow===1,isW=dow===0||dow===6;
        let cl='dc';if(isW)cl+=' we';if(isT)cl+=' tc';if(isMon)cl+=' ws';
        const ds=fd(d);let inner='';
        if(proj.p&&!isW){inner='<div class="pb"></div>';}
        else if(pd2.has(ds)){
          const ltype=lt(proj,ds)||'Aula de Projeto';
          const tcol=TC[ltype]||'#6b6a65';
          const ic=ind(ltype);
          inner=`<div class="bw" data-d="${proj.d}|${proj.t}|${bloco}|${ds}|${ltype}|${col}|${tcol}"><div class="bm" style="background:${col}">${ic}</div></div>`;
        }
        h+=`<td class="${cl}">${inner}</td>`;
      });
      h+='</tr>';
    });
  });
  h+='</tbody>';tbl.innerHTML=h;

  tbl.querySelectorAll('[data-d]').forEach(el=>{
    el.addEventListener('mouseenter',e=>{
      const[disc,turma,bloco,date,ltype,col,tcol]=el.dataset.d.split('|');
      const bn=parseInt(bloco.split(' ')[1]);const an=ta(turma);
      const disc2=disc==='Geometria'?'Matemática':disc;
      const nome=PNAMES[`${an}_${disc2}_${bn}`]||'';
      tip.innerHTML=`<b>${disc}</b> <span style="opacity:.5">·</span> Turma ${turma}<br><span class="tbadge" style="background:${tcol}22;color:${tcol}">${ltype}</span>${nome?`<br><span style="opacity:.55;font-size:10px">${nome}</span>`:''}<br><span style="opacity:.4;font-size:10px">${bloco} · ${date}/2026</span>`;
      tip.style.display='block';
    });
    el.addEventListener('mouseleave',()=>tip.style.display='none');
  });
}
render();
</script>
</body>
</html>
